<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-secondary: #1e293b;
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-radius: 16px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.2) 0, transparent 50%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HERO & SEARCH SECTION --- */
        .hero {
            text-align: center;
            padding: 80px 20px 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .search-container {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 8px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 550px;
            position: relative;
        }

        .search-container:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 15px 35px rgba(139, 92, 246, 0.2);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 45px 15px 25px;
            /* Extra padding on right for the X button */
            font-size: 1.1rem;
            font-family: inherit;
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
            box-sizing: border-box;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        /* Custom Clear/Reset Button */
        .clear-btn {
            position: absolute;
            right: 15px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            /* Hidden by default */
            padding: 5px;
            transition: color 0.2s ease;
            outline: none;
        }

        .clear-btn:hover {
            color: var(--accent-secondary);
        }

        button.recommend-btn {
            padding: 0 35px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.recommend-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
        }

        /* --- LOADER --- */
        .loader {
            display: none;
            margin-top: 60px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-primary);
            animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* --- RESULTS GRID --- */
        .results-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
            padding: 40px 20px 80px;
            max-width: 1300px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Responsive Grid */
        @media (max-width: 1100px) {
            .results-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 900px) {
            .results-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .results-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .search-container {
                flex-direction: column;
                background: transparent;
                border: none;
                box-shadow: none;
                gap: 15px;
                padding: 0;
            }

            .input-wrapper {
                width: 100%;
                background: rgba(255, 255, 255, 0.05);
                border-radius: 12px;
            }

            input[type="text"] {
                padding: 15px 45px 15px 15px;
            }

            button.recommend-btn {
                width: 100%;
                padding: 15px;
                border-radius: 12px;
            }
        }

        /* --- MOVIE CARDS --- */
        .movie-card {
            background-color: var(--bg-secondary);
            border-radius: var(--card-radius);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .movie-card-inner {
            position: relative;
            width: 100%;
            aspect-ratio: 2/3;
            overflow: hidden;
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        /* PERMANENTLY VISIBLE MOVIE INFO */
        .movie-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 15px 15px;
            box-sizing: border-box;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.5) 60%, transparent 100%);
            opacity: 1;
            /* Title always visible */
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .movie-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0;
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Hover Effects */
        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .movie-card:hover img {
            transform: scale(1.08);
        }

        .movie-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--card-radius);
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0);
            transition: box-shadow 0.3s ease;
            pointer-events: none;
        }

        .movie-card:hover::after {
            box-shadow: inset 0 0 0 2px var(--accent-primary);
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Discover Movies</h1>
        <p class="subtitle">Find your next favorite film using our AI recommendation engine.</p>

        <div class="search-container">
            <div class="input-wrapper">
                <!-- Added oninput event to track when user types -->
                <input type="text" id="movie-input" list="movie-list" placeholder="Enter a movie you love..."
                    oninput="toggleClearBtn()">
                <!-- New clear button -->
                <button class="clear-btn" id="clear-btn" onclick="clearSearch()"
                    title="Clear to see all movies">✖</button>

                <datalist id="movie-list">
                    {% for movie in movies %}
                    <option value="{{ movie }}"></option>
                    {% endfor %}
                </datalist>
            </div>
            <button class="recommend-btn" onclick="getRecommendations()">Recommend</button>
        </div>
    </div>

    <div class="loader" id="loader"></div>

    <div class="results-container" id="results">
        <!-- Movies will be injected here by JavaScript -->
    </div>

    <script>
        // --- LOGIC FOR CLEAR BUTTON --- //
        const movieInput = document.getElementById('movie-input');
        const clearBtn = document.getElementById('clear-btn');

        // Show 'X' only when there is text in the input
        function toggleClearBtn() {
            if (movieInput.value.length > 0) {
                clearBtn.style.display = 'block';
            } else {
                clearBtn.style.display = 'none';
            }
        }

        // Clear input, hide 'X', and refocus to show full dropdown again
        function clearSearch() {
            movieInput.value = '';
            toggleClearBtn();
            movieInput.focus();
        }

        // Trigger button click on "Enter" key press
        movieInput.addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                event.preventDefault();
                getRecommendations();
            }
        });

        // --- FETCH LOGIC --- //
        async function getRecommendations() {
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!movieInput.value) {
                alert("Please select or type a movie first!");
                return;
            }

            // Clear previous results and show loader
            resultsDiv.innerHTML = '';
            loader.style.display = 'block';

            try {
                const response = await fetch('/recommend', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ movie: movieInput.value })
                });

                const data = await response.json();
                loader.style.display = 'none';

                if (data.status === 'success') {
                    for (let i = 0; i < data.names.length; i++) {
                        const movieCard = `
                            <div class="movie-card">
                                <div class="movie-card-inner">
                                    <img src="${data.posters[i]}" alt="${data.names[i]}" onerror="this.src='https://via.placeholder.com/400x600/1e293b/ffffff?text=No+Poster'">
                                    <div class="movie-info">
                                        <p class="movie-title" title="${data.names[i]}">${data.names[i]}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                        resultsDiv.innerHTML += movieCard;
                    }
                } else {
                    alert("Error: " + data.message);
                }
            } catch (error) {
                loader.style.display = 'none';
                alert("Something went wrong! Please check your connection or backend.");
                console.error(error);
            }
        }
    </script>
</body>

</html>
